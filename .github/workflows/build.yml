name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3.2.1

      - name: Install required SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug -PversionCode=${{ github.run_number }} --stacktrace 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 3

      - name: Prepare release artifacts
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk muppet-debug.apk
          echo '{"versionCode":${{ github.run_number }}}' > version.json

      - name: Update latest release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Dernière version"
          body: |
            APK de debug mis à jour automatiquement à chaque merge dans `main`.
            Build : #${{ github.run_number }}

            **Installation :**
            1. Télécharge `muppet-debug.apk`
            2. Sur l'appareil : Paramètres → Sécurité → Autoriser sources inconnues
            3. Ouvre le fichier APK → Installer
          artifacts: "muppet-debug.apk,version.json"
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          draft: false
          prerelease: false
