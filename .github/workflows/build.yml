name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk muppet-debug.apk

      - name: Update latest release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Dernière version"
          body: |
            APK de debug mis à jour automatiquement à chaque merge dans `main`.

            **Installation :**
            1. Télécharge `muppet-debug.apk`
            2. Sur l'appareil : Paramètres → Sécurité → Autoriser sources inconnues
            3. Ouvre le fichier APK → Installer
          artifacts: muppet-debug.apk
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          prerelease: false
