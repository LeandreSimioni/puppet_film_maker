<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>* { margin:0; padding:0; } body { background:#150800; overflow:hidden; }</style>
</head>
<body>
<canvas id="sub" width="1080" height="1080" style="display:none"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const W=1080,H=1080;
const renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
renderer.setSize(W,H);
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x150800);
const camera=new THREE.PerspectiveCamera(42,W/H,0.1,100);
camera.position.set(0,0.2,6);
camera.lookAt(0,0.2,0);

scene.add(new THREE.AmbientLight(0xffeedd,0.4));
const key=new THREE.DirectionalLight(0xfff5e0,1.6);
key.position.set(3,5,5); scene.add(key);
const fill=new THREE.DirectionalLight(0x99bbff,0.35);
fill.position.set(-4,2,3); scene.add(fill);

const skinMat=new THREE.MeshStandardMaterial({color:0xf2c0a8,roughness:0.85});
const hairMat=new THREE.MeshStandardMaterial({color:0x4a3a2e,roughness:0.8});
const shirtMat=new THREE.MeshStandardMaterial({color:0xd98b4f,roughness:0.9});
const intMat=new THREE.MeshStandardMaterial({color:0x3a0a14,roughness:0.7});
const whiteMat=new THREE.MeshStandardMaterial({color:0xf5f1e8,roughness:0.4});
const darkMat=new THREE.MeshStandardMaterial({color:0x1a1410,roughness:0.5});
const hatMat=new THREE.MeshStandardMaterial({color:0x222222,roughness:0.9});
const lipMat=new THREE.MeshStandardMaterial({color:0xc07060,roughness:0.65});

const root=new THREE.Group(); scene.add(root);

// Corps
const neck=new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.32,0.5,24),
  new THREE.MeshStandardMaterial({color:0xd49060,roughness:0.8}));
neck.position.set(0,-0.58,0); root.add(neck);
const body=new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.62,1.6,24),shirtMat);
body.position.set(0,-1.6,0); root.add(body);

// Bras — phi=PI/2 = avant (+Z), rotation.x négatif = lever vers caméra
let leftArmGroup,rightArmGroup,leftElbowGroup,rightElbowGroup;
function makeArm(sx){
  const g=new THREE.Group();
  g.position.set(sx*0.58,-0.72,0.05);
  const ua=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,0.55,12),skinMat);
  ua.position.y=-0.275; g.add(ua);
  const elbow=new THREE.Group(); elbow.position.y=-0.55; g.add(elbow);
  const fa=new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.08,0.5,12),skinMat);
  fa.position.y=-0.25; elbow.add(fa);
  const hand=new THREE.Mesh(new THREE.SphereGeometry(0.12,12,10),skinMat);
  hand.position.y=-0.52; elbow.add(hand);
  root.add(g);
  if(sx<0){leftArmGroup=g;leftElbowGroup=elbow;}
  else{rightArmGroup=g;rightElbowGroup=elbow;}
}
makeArm(-1); makeArm(1);

// Tête
const headGroup=new THREE.Group(); root.add(headGroup);
// Sphère intérieure sombre — visible quand la bouche s'ouvre
headGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.9,32,24),intMat));

// Mâchoire haute
const upperJaw=new THREE.Group(); headGroup.add(upperJaw);
upperJaw.add(new THREE.Mesh(new THREE.SphereGeometry(1,48,32,0,Math.PI*2,0,Math.PI/2),skinMat));

// Lèvre haute : bande fine à l'équateur, ~70° de large centré sur l'avant (+Z → phi=PI/2)
// phiStart=PI*0.25 → phi de 45° à 135°, centré sur phi=90° = avant de la sphère
upperJaw.add(new THREE.Mesh(
  new THREE.SphereGeometry(1.03,40,5,Math.PI*0.25,Math.PI*0.5,Math.PI/2-0.2,0.22),
  lipMat));

const hairCap=new THREE.Mesh(new THREE.SphereGeometry(1.04,40,18,0,Math.PI*2,0,Math.PI/3),hairMat);
hairCap.position.y=0.02; upperJaw.add(hairCap);
const bangs=new THREE.Mesh(new THREE.SphereGeometry(0.85,22,10),hairMat);
bangs.scale.set(1,0.18,0.55); bangs.position.set(0,0.7,0.62); upperJaw.add(bangs);

let leftPupil,rightPupil;
function makeEye(sx){
  const g=new THREE.Group(); g.position.set(sx*0.4,0.45,0.78);
  g.add(new THREE.Mesh(new THREE.SphereGeometry(0.22,22,18),whiteMat));
  const p=new THREE.Mesh(new THREE.SphereGeometry(0.1,14,12),darkMat);
  p.position.z=0.16; g.add(p);
  if(sx<0) leftPupil=p; else rightPupil=p;
  const b=new THREE.Mesh(new THREE.BoxGeometry(0.32,0.07,0.08),darkMat);
  b.position.set(0,0.3,0.08); b.rotation.z=sx*-0.18; g.add(b);
  upperJaw.add(g);
}
makeEye(-1); makeEye(1);

const nose=new THREE.Mesh(new THREE.SphereGeometry(0.12,16,12),skinMat);
nose.scale.set(1,1.05,1.25); nose.position.set(0,0.12,0.97); upperJaw.add(nose);
const brim=new THREE.Mesh(new THREE.CylinderGeometry(1.25,1.25,0.1,48),hatMat);
brim.position.set(0,0.88,0); upperJaw.add(brim);
const crown=new THREE.Mesh(new THREE.CylinderGeometry(0.82,0.88,0.72,48),hatMat);
crown.position.set(0,1.28,0); upperJaw.add(crown);

// Mâchoire basse
const lowerJaw=new THREE.Group(); headGroup.add(lowerJaw);
lowerJaw.add(new THREE.Mesh(new THREE.SphereGeometry(1,48,32,0,Math.PI*2,Math.PI/2,Math.PI/2),skinMat));

// Lèvre basse : même phi que la haute, bande fine juste sous l'équateur
lowerJaw.add(new THREE.Mesh(
  new THREE.SphereGeometry(1.03,40,5,Math.PI*0.25,Math.PI*0.5,Math.PI/2,0.22),
  lipMat));

let state={
  mouthOpen:0, gazeX:0, gazeY:0, roll:0, posX:0,
  eyeX:0, eyeY:0,
  leftShoulder:0, leftElbow:0, rightShoulder:0, rightElbow:0
};
let timeline=[]; let isExporting=false;

function updatePuppet(){
  headGroup.rotation.y=state.gazeX*0.65;
  headGroup.rotation.x=-state.gazeY*0.35;
  root.rotation.z=state.roll;
  root.position.x=state.posX;
  lowerJaw.rotation.x=state.mouthOpen*0.9;
  upperJaw.rotation.x=-state.mouthOpen*0.25;

  // Pupilles indépendantes — se déplacent sur la surface de l'œil blanc
  const px=state.eyeX*0.09, py=state.eyeY*0.07;
  const pz=Math.sqrt(Math.max(0.005,0.16*0.16-px*px-py*py));
  if(leftPupil){leftPupil.position.x=px;leftPupil.position.y=py;leftPupil.position.z=pz;}
  if(rightPupil){rightPupil.position.x=px;rightPupil.position.y=py;rightPupil.position.z=pz;}

  // Bras
  if(leftArmGroup){
    leftArmGroup.rotation.x=-state.leftShoulder*1.1;
    leftArmGroup.rotation.z=state.leftShoulder*0.15;
    leftElbowGroup.rotation.x=state.leftElbow*1.0;
  }
  if(rightArmGroup){
    rightArmGroup.rotation.x=-state.rightShoulder*1.1;
    rightArmGroup.rotation.z=-state.rightShoulder*0.15;
    rightElbowGroup.rotation.x=state.rightElbow*1.0;
  }
}

function renderLoop(){requestAnimationFrame(renderLoop);updatePuppet();renderer.render(scene,camera);}
renderLoop();

// Export frames (test sans timeline)
function startRender(totalFrames,fps){
  if(isExporting)return;
  isExporting=true;
  Android.onRenderStart(totalFrames);
  let frame=0;
  function next(){
    if(frame>=totalFrames){isExporting=false;Android.onRenderComplete();return;}
    state.mouthOpen=0.5+0.5*Math.sin(frame*(1/fps)*Math.PI*2);
    updatePuppet();
    renderer.render(scene,camera);
    Android.onFrame(renderer.domElement.toDataURL('image/jpeg',0.9),frame);
    frame++;
    setTimeout(next,0);
  }
  next();
}

function computeLipSync(t,words){
  for(const w of words){
    if(t>=w.start&&t<=w.end){
      const p=(t-w.start)/Math.max(w.end-w.start,0.05);
      return 0.35+0.65*Math.sin(p*Math.PI);
    }
  }
  const prev=words.filter(w=>w.end<=t).pop();
  if(prev&&t-prev.end<0.08) return(1-(t-prev.end)/0.08)*0.25;
  return 0;
}

const subCanvas=document.getElementById('sub');
const subCtx=subCanvas.getContext('2d');

function drawSubtitle(t,words){
  subCtx.clearRect(0,0,W,H);
  const w=words.find(w=>t>=w.start&&t<=w.end);
  if(!w)return;
  const text=w.text||w.word||'';
  subCtx.font='bold 56px sans-serif';
  subCtx.textAlign='center';
  subCtx.lineWidth=6;
  subCtx.strokeStyle='rgba(0,0,0,0.85)';
  subCtx.strokeText(text,W/2,H-80);
  subCtx.fillStyle='#ffffff';
  subCtx.fillText(text,W/2,H-80);
}

function captureFrame(t,words){
  const comp=document.createElement('canvas');
  comp.width=W;comp.height=H;
  const ctx=comp.getContext('2d');
  ctx.drawImage(renderer.domElement,0,0);
  drawSubtitle(t,words);
  ctx.drawImage(subCanvas,0,0);
  return comp.toDataURL('image/jpeg',0.9);
}

function startRenderWithTimeline(tl,duration,words){
  words=words||[];
  timeline=tl.map(e=>({...e,_done:false}));
  const fps=30,totalFrames=Math.ceil(duration*fps);
  if(isExporting)return;
  isExporting=true;
  Android.onRenderStart(totalFrames);
  let frame=0;
  function next(){
    if(frame>=totalFrames){isExporting=false;Android.onRenderComplete();return;}
    const t=frame/fps;
    for(const ev of timeline){
      if(!ev._done&&t>=ev.t){applyAction(ev);ev._done=true;}
    }
    state.mouthOpen=computeLipSync(t,words);
    updatePuppet();
    renderer.render(scene,camera);
    Android.onFrame(captureFrame(t,words),frame);
    frame++;
    setTimeout(next,0);
  }
  next();
}

function applyAction(ev){
  if(ev.action==='setGaze'){state.gazeX=ev.gx??0;state.gazeY=ev.gy??0;}
  else if(ev.action==='setRoll'){state.roll=ev.rad??0;}
  else if(ev.action==='setMouth'){state.mouthOpen=ev.amount??0;}
  else if(ev.action==='moveX'){state.posX=ev.x??0;}
  else if(ev.action==='setEye'){state.eyeX=ev.ex??0;state.eyeY=ev.ey??0;}
  else if(ev.action==='setArm'){
    const s=ev.side;
    if(s==='left'){
      if(ev.shoulder!==undefined)state.leftShoulder=ev.shoulder;
      if(ev.elbow!==undefined)state.leftElbow=ev.elbow;
    }else{
      if(ev.shoulder!==undefined)state.rightShoulder=ev.shoulder;
      if(ev.elbow!==undefined)state.rightElbow=ev.elbow;
    }
  }
}

function setBackgroundUrl(url){
  new THREE.TextureLoader().load(url,function(tex){
    tex.colorSpace=THREE.SRGBColorSpace;
    scene.background=tex;
  });
}

window.startRender=startRender;
window.startRenderWithTimeline=startRenderWithTimeline;
window.setMouthOpen=(v)=>{state.mouthOpen=v;};
window.setBackgroundUrl=setBackgroundUrl;
</script>
</body>
</html>
